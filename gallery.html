    <meta charset="UTF-8">

    <title>The Gallery - Ademi</title>
    <style>
        :root { --primary: #ff4b5c; --bg: #0b0914; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        header { padding: 50px 20px; background: linear-gradient(to bottom, rgba(255, 75, 92, 0.1), transparent); }
        h1 { font-size: 2rem; letter-spacing: 3px; color: var(--primary); margin: 0; text-transform: uppercase; }
        
        /* Optimized Gallery Grid */
        #gallery-grid { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-bottom: 100px; 
        }
        #gallery-grid img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: transform 0.4s ease; 
        }
        #gallery-grid img:hover { transform: scale(1.03); border-color: var(--primary); }

        .footer-nav { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
        }
        .back-nav { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 12px 40px; 
            border-radius: 30px; 
            font-weight: bold; 
            box-shadow: 0 5px 20px rgba(255, 75, 92, 0.4); 
        }
    </style>
</head>

        // Shuffle logic (Fisher-Yates Algorithm)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const grid = document.getElementById('gallery-grid');
        const shuffledImages = shuffle([...images]); // Shuffle a copy of the array

        // Load images into the grid
        shuffledImages.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.loading = "lazy"; // Helps with performance
            grid.appendChild(img);
        });
