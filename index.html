<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Adenike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.1/css/lightgallery-bundle.min.css">
    <style>
        :root {
            --primary: #ff4b5c;
            --glass: rgba(255, 255, 255, 0.08);
            --bg: #0b0914;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1a1a2e, #0b0914);
            color: white;
            overflow-x: hidden;
        }

        /* Floating Animation */
        .bg-elements {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        #lock-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: 0.8s ease;
        }

        .login-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 80%; max-width: 320px;
        }

        input {
            width: 100%; padding: 15px; margin: 20px 0;
            border-radius: 15px; border: none; text-align: center;
            font-size: 16px; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 20px rgba(255,75,92,0.4);
        }

        #main-content { display: none; opacity: 0; transition: 2s ease; }

        header { text-align: center; padding: 80px 20px 40px; }
        h1 { font-weight: 200; letter-spacing: 5px; margin-bottom: 20px; }
        
        .letter-box {
            max-width: 600px; margin: 0 auto 60px;
            background: var(--glass); padding: 30px;
            border-radius: 20px; font-style: italic; line-height: 1.8;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Masonry Grid */
        .gallery-grid {
            column-count: 2;
            column-gap: 15px;
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) { .gallery-grid { column-count: 3; } }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            background: var(--glass);
            transition: 0.4s ease;
            cursor: pointer;
        }

        .gallery-item:hover { transform: scale(1.02); }
        .gallery-item img { width: 100%; display: block; border-radius: 15px; }

        #error-msg { color: #ff8e9a; font-size: 14px; margin-top: 10px; }
        
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; font-size: 20px; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="bg-elements" id="bg-stars"></div>

    <div id="lock-screen">
        <div class="login-box">
            <h2>Hi my little princess Ademi ❤️</h2>
            <input type="password" id="pass" placeholder="Enter our secret key...">
            <button onclick="unlock()">Unlock Memories</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>ADENIKE</h1>
            <div class="letter-box"><br><br>
