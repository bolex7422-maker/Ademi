<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Private Gallery</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; color: #f0f0f0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; transition: opacity 1s ease, visibility 1s; }
        .login-box { text-align: center; padding: 30px; background: rgba(255, 255, 255, 0.03); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .login-box h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; color: #fff; }
        input[type="password"] { padding: 15px; width: 220px; border-radius: 30px; border: 1px solid #333; background: #151515; color: #fff; text-align: center; outline: none; font-size: 1.1rem; margin-bottom: 15px; transition: border-color 0.3s; }
        input[type="password"]:focus { border-color: #fff; }
        #unlock-btn { padding: 12px 35px; border-radius: 30px; border: none; background: #ffffff; color: #000; cursor: pointer; font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s, transform 0.2s; }
        #unlock-btn:hover { background: #e0e0e0; transform: translateY(-2px); }
        #error-msg { color: #ff6b6b; margin-top: 15px; font-size: 0.9rem; min-height: 1.2rem; }
        #main-content { display: none; opacity: 0; visibility: hidden; transition: opacity 1.5s ease; }
        header { text-align: center; padding: 80px 20px 40px; }
        header h1 { font-weight: 200; font-size: 2.5rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; color: #fff; }
        header p { font-weight: 300; letter-spacing: 1px; opacity: 0.7; margin-top: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); grid-gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .photo-card { position: relative; border-radius: 10px; overflow: hidden; background-color: #1a1a1a; box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: transform 0.4s ease, box-shadow 0.4s ease; }
        .photo-card.portrait { aspect-ratio: 2 / 3; }
        .photo-card.square { aspect-ratio: 1 / 1; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .photo-card:hover { transform: translateY(-5px); box-shadow: 0 12px 35px rgba(0,0,0,0.5); }
        .photo-card:hover img { transform: scale(1.08); }
        @media (max-width: 600px) { header h1 { font-size: 1.8rem; letter-spacing: 4px; } .gallery { grid-template-columns: 1fr; padding: 10px; } }
        footer { text-align: center; padding: 80px 20px; font-size: 0.9rem; font-weight: 300; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="login-box">
            <h2>Enter Secret Key</h2>
            <input type="password" id="passInput" placeholder="Enter key...">
            <br>
            <button id="unlock-btn" onclick="checkPassword()">Unlock</button>
            <p id="error-msg"></p>
        </div>
    </div>
    <div id="main-content">
        <header>
            <h1>Our Moments</h1>
            <p>A private collection for your eyes only.</p>
        </header>
        <div class="gallery">
            <div class="photo-card portrait"><img src="https://i.postimg.cc/VvVMSt5X/IMG-9867.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/x1cnQFwG/0f04122d-c57f-446d-8d73-c115d0104dfc.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/dVLwFSbD/39c8505d-555a-4e1f-98c7-3411131a5cfc.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/BnX43wr8/4877d535-09f5-4c7b-9237-2263de300a19.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/rwKMTYBW/8200f728-cb5b-442b-8e01-361d3e998511.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/t4YpbmKx/9a2c11e4-d63e-4ba0-a15a-d4c1a38fd36f.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/T3pfxHzp/9c2c102f-d25e-49a1-8f2b-115ec16f679c.jpg" alt="Moments"></div>
            <div class="photo-card portrait"><img src="https://i.postimg.cc/y8ksKrM0/9d696f63-e1cd-4039-93f1-ed9173a50300.jpg" alt="Moments"></div>
            <div class="photo-card square"><img src="https://i.postimg.cc/MpvqwrCb/c151a952-49e2-4d78-818f-6df19bb30ba8.jpg" alt="Moments"></div>
            <div class="photo-card square"><img src="https://i.postimg.cc/HkVdmPqx/c8cc2953-6498-4ea0-96d3-444eb33f00a5.jpg" alt="Moments"></div>
        </div>
        <footer><p>&copy; 2026 • Private Collection • Made with Love</p></footer>
    </div>
    <script>
        const CORRECT_PASSWORD = "Adenike";
        function checkPassword() {
            const passwordEntry = document.getElementById("passInput").value;
            const lockScreen = document.getElementById("lock-screen");
            const mainContent = document.getElementById("main-content");
            const errorMsg = document.getElementById("error-msg");
            if (passwordEntry === CORRECT_PASSWORD) {
                lockScreen.style.opacity = "0";
                setTimeout(() => {
                    lockScreen.style.display = "none";
                    lockScreen.style.visibility = "hidden";
                    mainContent.style.display = "block";
                    mainContent.style.visibility = "visible";
                    setTimeout(() => { mainContent.style.opacity = "1"; }, 50);
                }, 1000);
            } else {
                errorMsg.innerText = "Incorrect key. Please try again.";
                document.getElementById("passInput").value = "";
            }
        }
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { checkPassword(); }
        });
    </script>
</body>
</html>
