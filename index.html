<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Ademi</title>
    <style>
        :root { --primary: #ff4b5c; --glass: rgba(255, 255, 255, 0.08); --bg: #0b0914; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; text-align: center; }
        
        .bg-elements { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .heart { position: absolute; color: var(--primary); opacity: 0.2; animation: float 15s linear infinite; }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--glass); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 80%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; text-align: center; }
        .login-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 10px; width: 100%; font-weight: bold; }

        #main-content { display: none; padding: 20px; }
        header h1 { font-size: 3rem; color: var(--primary); margin-top: 50px; text-shadow: 0 0 20px rgba(255,75,92,0.5); }
        .letter-box { background: var(--glass); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); line-height: 1.6; font-style: italic; }
        
        .btn { display: block; width: 85%; padding: 15px; margin: 15px auto; border-radius: 30px; font-weight: bold; text-decoration: none; border: 1px solid var(--primary); color: white; }
        .btn-red { background: var(--primary); }
        .btn-outline { border-color: white; }
    </style>
</head>
<body>
    <div class="bg-elements" id="bg"></div>

    <div id="lock-screen">
        <div class="login-box">
            <h2>Hi Ademi ❤️</h2>
            <input type="password" id="pass" placeholder="Enter Secret Key">
            <button class="login-btn" onclick="unlock()">Unlock Memories</button>
        </div>
    </div>

    <div id="main-content">
        <h1>ADENIKE</h1>
        <div class="letter-box">
            "Every second with you is a gift I promise to never take for granted. This is our space."
            <br><br>
            <a href="reasons.html" class="btn btn-red">My Special Messages to you Ademi💕 →</a>
            <a href="videos.html" class="btn btn-outline">Watch Our Moments ❤️💕 🎥</a>
            <a href="gallery.html" class="btn" style="background: rgba(255,255,255,0.05)">Our Photo Gallery💕❤️📸</a>
            <a href="games.html" class="btn" style="background: rgba(255,255,255,0.1)"> Scratch and win Amazing prizes 🎁</a>

        </div>
        <p style="margin-top: 40px; opacity: 0.5;">Forever Yours, Ayomide Boluwatife </p>
    </div>

    <script>
        // Check if she already logged in during this visit
        if (sessionStorage.getItem("unlocked") === "true") {
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }

        function unlock() {
            if (document.getElementById("pass").value.toLowerCase() === "adenike") {
                sessionStorage.setItem("unlocked", "true"); // Saves the login status
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }
        }

        // Heart animation
        const bg = document.getElementById('bg');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 10 + 's';
            bg.appendChild(heart);
        }
    </script>
</body>
</html>
