<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Ademi</title>
    <style>
        :root { --primary: #ff4b5c; --bg: #0b0914; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 280px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; text-align: center; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        
        #main-content { display: none; padding: 20px; }
        .btn { display: block; padding: 15px; margin: 10px auto; width: 85%; max-width: 300px; border-radius: 30px; text-decoration: none; font-weight: bold; border: 1px solid var(--primary); color: white; }
        .btn-gallery { background: rgba(255, 75, 92, 0.1); }
        
        #photo-gallery { display: none; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .grid img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="box">
            <h2>Hi Ademi ❤️</h2>
            <input type="password" id="pass" placeholder="Secret Key">
            <button onclick="unlock()">Unlock</button>
        </div>
    </div>

    <div id="main-content">
        <h1 style="color:var(--primary)">ADENIKE</h1>
        <p style="padding: 0 20px; opacity: 0.8;">"I will always love you till the end."</p>
        
        <a href="reasons.html" class="btn">A Special Message →</a>
        <a href="videos.html" class="btn" style="border-color: white;">Watch Our Videos 🎥</a>
        <div class="btn btn-gallery" onclick="toggle()">View Our Gallery 📸</div>

        <div id="photo-gallery">
            <div class="grid">
                <img src="https://i.postimg.cc/85zPsqM8/IMG-7275.jpg">
                <img src="https://i.postimg.cc/0jXyZ7v6/IMG-7276.jpg">
                <img src="https://i.postimg.cc/8C0XF7xY/IMG-7278.jpg">
                <img src="https://i.postimg.cc/44rGvYk8/IMG-7281.jpg">
            </div>
            <p style="margin: 40px 0;">Prepared with love by <br><strong>Akinola Boluwatife Ayomide</strong></p>
        </div>
    </div>

    <script>
        function unlock() {
            if (document.getElementById("pass").value.toLowerCase() === "adenike") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }
        }
        function toggle() {
            var g = document.getElementById("photo-gallery");
            g.style.display = (g.style.display === "none") ? "block" : "none";
            if(g.style.display === "block") window.scrollBy(0, 300);
        }
    </script>
</body>
</html>
