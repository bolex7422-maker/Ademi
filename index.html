<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Adenike</title>
    <style>
        :root {
            --primary: #ff4b5c;
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #lock-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .login-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 14px;
            margin: 25px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 75, 92, 0.4);
        }

        button:active { transform: scale(0.95); }

        #main-content {
            display: none;
            padding: 20px;
            animation: fadeIn 1.5s ease;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        h1 { font-size: 2.2rem; font-weight: 300; margin-bottom: 15px; letter-spacing: 3px; }
        
        .letter {
            max-width: 500px;
            margin: 0 auto 50px;
            line-height: 1.8;
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            font-style: italic;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto 100px;
        }

        .card {
            background: var(--glass);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.2);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            display: block;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #error-msg { color: #ff8e9a; font-size: 14px; margin-top: 15px; height: 20px; }
    </style>
</head>
<body>

    <div class="bg-hearts" id="heart-bg"></div>

    <div id="lock-screen">
        <div class="login-box">
            <h2>Hiiii ❤️</h2>
            <p style="opacity: 0.8;">Enter our secret key</p>
            <input type="password" id="pass" placeholder="Your name...">
            <button onclick="unlock()">Open My Heart</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>For You, Adenike</h1>
            <div class="letter">
                "Every photo here is a piece of a story I never want to end. Thank you for being my favorite chapter."
            </div>
        </header>

        <div class="gallery">
            <div class="card"><img src="https://i.postimg.cc/VvVMSt5X/IMG-9867.jpg" alt="Memory 1"></div>
            <div class="card"><img src="https://i.postimg.cc/x1cnQFwG/0f04122d-c57f-446d-8d73-c115d0104dfc.jpg" alt="Memory 2"></div>
            <div class="card"><img src="https://i.postimg.cc/dVLwFSbD/39c8505d-555a-4e1f-98c7-3411131a5cfc.jpg" alt="Memory 3"></div>
            <div class="card"><img src="https://i.postimg.cc/BnX43wr8/4877d535-09f5-4c7b-9237-2263de300a19.jpg" alt="Memory 4"></div>
            <div class="card"><img src="https://i.postimg.cc/rwKMTYBW/8200f728-cb5b-442b-8e01-361d3e998511.jpg" alt="Memory 5"></div>
            <div class="card"><img src="https://i.postimg.cc/t4YpbmKx/9a2c11e4-d63e-4ba0-a15a-d4c1a38fd36f.jpg" alt="Memory 6"></div>
            <div class="card"><img src="https://i.postimg.cc/T3pfxHzp/9c2c102f-d25e-49a1-8f2b-115ec16f679c.jpg" alt="Memory 7"></div>
            <div class="card"><img src="https://i.postimg.cc/y8ksKrM0/9d696f63-e1cd-4039-93f1-ed9173a50300.jpg" alt="Memory 8"></div>
            <div class="card"><img src="https://i.postimg.cc/MpvqwrCb/c151a952-49e2-4d78-818f-6df19bb30ba8.jpg" alt="Memory 9"></div>
            <div class="card"><img src="https://i.postimg.cc/HkVdmPqx/image.jpg" alt="Memory 10"></div>
        </div>
    </div>

    <script>
        function unlock() {
            const pin = document.getElementById('pass').value;
            if(pin.toLowerCase() === 'adenike') {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    window.scrollTo(0,0);
                }, 800);
            } else {
                document.getElementById('error-msg').innerText = "Not quite... try again, my love.";
            }
        }

        // Animated Hearts Background
        const bg = document.getElementById('heart-bg');
        const heartIcons = ['❤️', '💖', '✨', '🌸'];
        for (let i = 0; i < 25; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.opacity = Math.random() * 0.2;
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.filter = 'blur(1px)';
            bg.appendChild(heart);
        }
    </script>
</body>
</html>
