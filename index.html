<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Our Story - Ademi</title>
    <style>
        :root { --primary: #ff4b5c; --glass: rgba(255, 255, 255, 0.08); --bg: #0b0914; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; text-align: center; }
        
        /* Floating Background Animation */
        .bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart { position: absolute; color: var(--primary); opacity: 0.2; animation: float 15s linear infinite; }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--glass); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 80%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; text-align: center; font-size: 1rem; }
        .login-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Main Content */
        #main-content { display: none; padding: 20px; }
        header h1 { font-size: 3rem; color: var(--primary); margin-top: 50px; text-shadow: 0 0 20px rgba(255,75,92,0.5); }
        .letter-box { background: var(--glass); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); line-height: 1.6; font-style: italic; }
        
        /* Buttons */
        .btn { display: block; width: 85%; padding: 15px; margin: 15px auto; border-radius: 30px; font-weight: bold; text-decoration: none; transition: 0.3s; cursor: pointer; border: 1px solid var(--primary); color: white; text-align: center; }
        .btn-red { background: var(--primary); }
        .btn-outline { background: transparent; border-color: white; }
        .btn-gallery { background: rgba(255, 75, 92, 0.1); color: var(--primary); }

        /* Gallery Grid */
        #photo-gallery { display: none; margin-top: 30px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .gallery img { width: 100%; height: 230px; object-fit: cover; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .gallery img:hover { transform: scale(1.03); border-color: var(--primary); }
    </style>
</head>

    <script>
        function unlock() {
            if (document.getElementById("pass").value.toLowerCase() === "adenike") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }
        }
        function toggleGallery() {
            var g = document.getElementById("photo-gallery");
            g.style.display = (g.style.display === "none") ? "block" : "none";
            if(g.style.display === "block") window.scrollBy(0, 400);
        }
        // Background Heart Animation
        const bg = document.getElementById('bg');
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 15 + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            bg.appendChild(heart);
        }
    </script>
