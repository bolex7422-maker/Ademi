<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 Reasons - Ademi</title>
    <style>
        :root {
            --primary: #ff4b5c;
            --bg: #0b0914;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: #e0e0e0;
            text-align: center;
        }

        header { padding: 80px 20px 40px; }
        h1 { font-size: 2.2rem; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }

        .container {
            width: 90%;
            max-width: 650px;
            margin: 0 auto 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .reason-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-left: 3px solid var(--primary);
            padding: 25px;
            border-radius: 5px;
            text-align: left;
        }

        .number { color: var(--primary); font-size: 0.7rem; display: block; margin-bottom: 8px; font-family: sans-serif; }
        .text { line-height: 1.7; font-size: 1.05rem; }

        /* Sticky Navigation like the Gallery */
        .footer-nav { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
            width: 100%;
        }
        .back-nav { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 12px 40px; 
            border-radius: 30px; 
            font-weight: bold; 
            box-shadow: 0 5px 20px rgba(255, 75, 92, 0.4); 
        }
    </style>
</head>
<body>

    <header>
        <h1>The Infinite Vault</h1>
        <p style="opacity: 0.5; font-style: italic;">1,000 reflections of my love for you.</p>
    </header>

    <div class="container" id="reason-container">
        </div>

    <div class="footer-nav">
        <a href="index.html" class="back-nav">← Back Home</a>
    </div>

    <script>
        const categories = {
            romantic: [
                "I love how your soul mirrors mine in ways I never thought possible.",
                "The way you handle my heart with such care makes me feel truly seen.",
                "I love that you are my safest place and my most thrilling adventure.",
                "The peace I feel when you are near is something I can't find anywhere else.",
                "I love that we don't just exist together, we grow together.",
                "You are the answer to prayers I didn't even know I was whispering.",
                "I love the way you look at me when you think I’m not noticing.",
                "Your resilience is a constant source of inspiration for me.",
                "I love how we can be ourselves without any filters or pretenses."
            ],
            sensual: [
                "I love the intoxicating scent of your skin after a long day.",
                "The way your hands feel on my chest is my favorite sensation.",
                "I love the electricity that sparks every time our fingers touch.",
                "The sound of your voice in the quiet of the night is my favorite melody.",
                "I love the way your body fits perfectly against mine, like a missing piece.",
                "The curve of your smile is only rivaled by the curve of your waist.",
                "I love the way you taste—it's a craving I can never fully satisfy.",
                "There is a specific way you look at me that tells me exactly what you're thinking."
            ],
            playful: [
                "I love that we fight and settle like cat and dog—it keeps us real.",
                "Your stubbornness is frustratingly beautiful, and I wouldn't change it.",
                "I love our inside jokes that make zero sense to anyone else.",
                "The way you tease me is the highlight of my afternoon.",
                "I love that you know exactly which buttons to push to make me laugh.",
                "Even when we're 'fighting,' I'm secretly thinking about how much I love you."
            ],
            future: [
                "I love that when I think of home, I think of your face.",
                "The vision of you as the mother of my children is my ultimate goal.",
                "I love that we are building a legacy together, not just a relationship.",
                "I can't wait to see how beautifully you age through the years.",
                "I love the thought of us being that old couple still holding hands in the park."
            ]
        };

        function generate1000() {
            let fullList = [];
            let allPhrases = [...categories.romantic, ...categories.sensual, ...categories.playful, ...categories.future];
            
            // To avoid boring repetition, we create variations by combining different starts/ends
            const connectors = ["Because", "I truly love that", "It's incredible how", "I cherish how"];
            
            for (let i = 0; i < 1000; i++) {
                let randomPhrase = allPhrases[i % allPhrases.length];
                // Add slight variations to the phrasing to keep it fresh
                if (i > allPhrases.length) {
                    let connector = connectors[i % connectors.length];
                    randomPhrase = connector + " " + randomPhrase.charAt(0).toLowerCase() + randomPhrase.slice(1);
                }
                fullList.push(randomPhrase);
            }
            return fullList.sort(() => Math.random() - 0.5);
        }

        const container = document.getElementById('reason-container');
        const finalMessages = generate1000();

        finalMessages.forEach((msg, index) => {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.innerHTML = `
                <span class="number">REASON NO. ${(index + 1).toString().padStart(4, '0')}</span>
                <div class="text">${msg}</div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
