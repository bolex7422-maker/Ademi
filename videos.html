<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Moments - Ademi</title>
    <style>
        :root {
            --primary: #ff4b5c;
            --bg: #0b0914;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .video-container {
            width: 90%;
            max-width: 400px; /* Slimmer for YouTube Shorts/Portrait video */
            margin: 20px auto;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* Perfect 9:16 ratio for Shorts */
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
            text-align: center;
        }

        .video-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .footer {
            margin: 40px 0 60px;
            text-align: center;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            border: 1px solid var(--primary);
            padding: 10px 25px;
            border-radius: 25px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        .signature {
            margin-top: 30px;
            font-style: italic;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Moments in Motion</h1>
        <p>I love every second of our journey.</p>
    </header>

    <div class="video-container">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/SkfLRm07nkA" 
                    title="Our Memory" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="video-info">
            <h3>Treasured Moment</h3>
            <p>One of my favorite memories of us. ❤️</p>
        </div>
    </div>

    <div class="footer">
        <a href="index.html" class="back-btn">← Back to Gallery</a>
        <div class="signature">
            Prepared with love by <br>
            <strong>Akinola Boluwatife Ayomide</strong>
        </div>
    </div>

</body>
</html>
